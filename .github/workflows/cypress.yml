name: Cypress Tests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: ["api", "ui-1", "ui-2", "other"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cypress run
        uses: cypress-io/github-action@v6
        env:
          PORT: 3000
        with:
          record: false
          parallel: false
          build: yarn build
          start: yarn start:ci
          wait-on: "http://localhost:3000, http://localhost:3001"
          wait-on-timeout: 200
          browser: chrome
          spec: >-
            ${{
              matrix.group == 'api' && 'cypress/tests/api/**/*' ||
              matrix.group == 'ui-1' && 'cypress/tests/ui/{auth,bankaccounts,execicio,exercicio_enviar,exercicio_historico}*' ||
              matrix.group == 'ui-2' && 'cypress/tests/ui/{new-transaction,notifications,transaction-feeds,transaction-view,user-settings}*' ||
              'cypress/tests/{demo,ui-auth-providers}/**/*'
            }}

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.group }}
          path: cypress/screenshots/

      - name: Upload Videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos-${{ matrix.group }}
          path: cypress/videos/